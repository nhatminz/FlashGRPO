method: pure_grpo_b200_qwen25_7b
run_name: pure_grpo_b200_qwen25_7b
seed: 42

model:
  model_dir: models/Qwen2.5-7B-Instruct
  model_type: qwen2
  dtype: bf16
  attn_implementation: flash_attention_2

data:
  train_option: simplelr_abel_level3to5

generation:
  do_sample: true
  temperature: 1.0
  top_p: 0.95
  top_k:
  max_prompt_length: 2048
  max_length: 4096
  repeated_generate_nums: 8

training:
  batch_size: 8
  num_epochs: 1
  start_epoch: 0
  start_batch: 0
  start_used_items: 0
  start_rollout_count: 0
  sample_num: 100
  max_train_samples: 0
  accumulation_steps: 4
  grpo_iteration_num: 1
  target_lr: 1.0e-6
  beta: 0.04
  epsilon: 0.1
  max_training_padding_gap: 4096
  max_training_token: 4096
  logps_chunk_size: 512
  load_lora_path: ""
  save_steps: 10
  save_on_exception: true
  num_workers: 16
  persistent_workers: true
  saved_model_dir: outputs/pure_grpo_b200_qwen25_7b/target_lora

lora:
  r: 64
  alpha: 32
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

runtime:
  log_gpu_metrics: true
  gpu_poll_interval_s: 20.0
  empty_cache_enabled: true
  empty_cache_after_target_train: false
  empty_cache_threshold_mb: 140000
  empty_cache_reserved_ratio: 1.6
  generation_oom_split_retry: true
  generation_oom_max_splits: 3

logging:
  log_dir: logs/pure_grpo_b200/pure_grpo_b200_qwen25_7b
  append: false
  statistical_time: false
